name: kythera_flutter
description: Kythera Tools — Video processing app by D4nzxml
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # FFmpeg — gunakan versi min-gpl sesuai permintaan
  ffmpeg_kit_flutter_min_gpl: ^6.0.3

  # File picker untuk pilih video dari galeri
  file_picker: ^8.0.0

  # Permission handler untuk akses storage
  permission_handler: ^11.3.0

  # Untuk save ke galeri
  gallery_saver: ^2.3.2

  # Path provider
  path_provider: ^2.1.2

  # Untuk format ukuran file
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
