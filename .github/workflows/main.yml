name: Build Kythera APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repo
        uses: actions/checkout@v4

      # 1. HANCURKAN FOLDER ANDROID LAMA
      - name: Buang Folder Android Lama
        run: rm -rf android

      # 2. SIAPIN MESIN YANG PAS
      - name: Siapin Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Siapin Mesin Flutter 3.19.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      # 3. BIKIN ULANG ANDROID BARU
      - name: Bikin Ulang Android Baru
        run: flutter create --project-name kythera_flutter . --platforms=android

      # 4. DOWNLOAD PLUGIN KE SERVER DULU
      - name: Download Semua Package (Pub Get)
        run: flutter pub get

      # 5. SUNTIK NDK, MIN SDK & IZIN MEMORI
      - name: Suntik Konfigurasi Android
        run: |
          sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle
          sed -i 's/ndkVersion .*/ndkVersion "27.0.12077973"/g' android/app/build.gradle
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n' android/app/src/main/AndroidManifest.xml

      # 6. JURUS BYPASS: BAJAK PLUGIN FFMPEG DARI DALAM SERVER
      - name: Bajak Jalur Gudang FFmpeg
        run: |
          # Ganti semua jalur gudang mati (jcenter) jadi gudang resmi (mavenCentral) di semua plugin
          find /home/runner/.pub-cache/hosted/pub.dev/ -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +
          # Paksa suntik jalur tambahan kalau pluginnya kosongan
          find /home/runner/.pub-cache/hosted/pub.dev/ffmpeg_kit_flutter_min_gpl*/android -name "build.gradle" -exec sed -i 's/repositories {/repositories {\n        mavenCentral()\n        maven { url "https:\/\/jitpack.io" }/g' {} +

      # 7. RAKIT APK DENGAN JALUR YANG UDAH DIBAJAK
      - name: Rakit APK Release!
        run: flutter build apk --release

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Kythera-Tools-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
