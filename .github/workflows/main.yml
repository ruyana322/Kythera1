name: Build Kythera APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repo
        uses: actions/checkout@v4

      # 1. HANCURKAN FOLDER ANDROID LAMA
      - name: Buang Folder Android Lama
        run: rm -rf android

      # 2. SIAPIN MESIN YANG PAS
      - name: Siapin Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Siapin Mesin Flutter 3.19.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      # 3. BIKIN ULANG ANDROID BARU
      - name: Bikin Ulang Android Baru
        run: flutter create --project-name kythera_flutter . --platforms=android

      # 4. SUNTIK NDK & MIN SDK
      - name: Suntik NDK 27 & Min SDK 24
        run: |
          sed -i 's/ndkVersion .*/ndkVersion "27.0.12077973"/g' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle

      # 5. SUNTIK IZIN MEMORI
      - name: Suntik Izin Memori
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n' android/app/src/main/AndroidManifest.xml

      # 6. PEMBOBOL GUDANG FFMPEG (JURUS PYTHON - PAKSA PLUGIN TUNDUK)
      - name: Buka Gembok Gudang FFmpeg
        run: |
          python3 -c '
          import os
          # Buka paksa gudang di settings.gradle
          f = "android/settings.gradle"
          if os.path.exists(f):
              with open(f, "r") as file: c = file.read()
              c = c.replace("FAIL_ON_PROJECT_REPOS", "PREFER_SETTINGS")
              c = c.replace("PREFER_PROJECT", "PREFER_SETTINGS")
              c = c.replace("google()", "google()\n        mavenCentral()\n        maven { url \"https://jitpack.io\" }")
              with open(f, "w") as file: file.write(c)
          
          # Buka paksa gudang di build.gradle
          b = "android/build.gradle"
          if os.path.exists(b):
              with open(b, "r") as file: c = file.read()
              c = c.replace("google()", "google()\n        mavenCentral()\n        maven { url \"https://jitpack.io\" }")
              with open(b, "w") as file: file.write(c)
          '

      - name: Download Semua Package (Pub Get)
        run: flutter pub get

      - name: Rakit APK Release!
        run: flutter build apk --release

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Kythera-Tools-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
