name: Build Kythera APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repo
        uses: actions/checkout@v4

      # 1. HANCURKAN FOLDER ANDROID LAMA
      - name: Buang Folder Android Lama
        run: rm -rf android

      # 2. SIAPIN MESIN YANG PAS
      - name: Siapin Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Siapin Mesin Flutter 3.19.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      # 3. BIKIN ULANG ANDROID BARU
      - name: Bikin Ulang Android Baru
        run: flutter create --project-name kythera_flutter . --platforms=android

      # 4. DOWNLOAD PLUGIN FFMPEG
      - name: Download Semua Package (Pub Get)
        run: flutter pub get

      # 5. JURUS NUKLIR: TIMPA TOTAL FILE SETTINGAN!
      - name: Tulis Ulang Konfigurasi Mutlak
        run: |
          # A. Suntik NDK & SDK 
          sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle
          sed -i 's/ndkVersion .*/ndkVersion "27.0.12077973"/g' android/app/build.gradle
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n' android/app/src/main/AndroidManifest.xml

          # B. TIMPA TOTAL settings.gradle DENGAN GUDANG SONATYPE!
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "7.3.0" apply false
              id "org.jetbrains.kotlin.android" version "1.7.10" apply false
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://s01.oss.sonatype.org/content/repositories/releases/' }
                  maven { url 'https://jitpack.io' }
              }
          }

          include ":app"
          EOF

          # C. TIMPA TOTAL build.gradle ROOT BIA FFMPEG TUNDUK!
          cat << 'EOF' > android/build.gradle
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://s01.oss.sonatype.org/content/repositories/releases/' }
                  maven { url 'https://jitpack.io' }
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      # 6. RAKIT APK RELEASE!
      - name: Rakit APK Release!
        run: flutter build apk --release

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Kythera-Tools-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
